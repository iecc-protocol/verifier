<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IECC Open Verifier Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .status-valid { border-left: 4px solid #10b981; }
        .status-invalid { border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-3xl mx-auto">
        <header class="mb-12">
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">IECC Consortium</h1>
            <p class="text-gray-400">Independent Cryptographic Verification Protocol</p>
        </header>

        <section class="glass p-6 rounded-xl mb-8">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-500 mb-4">Manual Verification Engine</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Raw Credential Payload (JSON)</label>
                    <textarea id="payload" rows="5" class="w-full bg-black border border-gray-800 rounded p-3 text-sm font-mono focus:border-blue-500 outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Signature (Hex)</label>
                        <input id="signature" type="text" class="w-full bg-black border border-gray-800 rounded p-3 text-sm font-mono focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Public Key (Hex)</label>
                        <input id="pubkey" type="text" class="w-full bg-black border border-gray-800 rounded p-3 text-sm font-mono focus:border-blue-500 outline-none">
                    </div>
                </div>
                <button onclick="handleVerify()" class="w-full bg-white text-black font-bold py-3 rounded hover:bg-gray-200 transition-colors">
                    Execute Verification
                </button>
            </div>
        </section>

        <div id="result" class="hidden glass p-6 rounded-xl">
            <!-- Results injected here -->
        </div>
    </div>

    <script type="module">
        window.handleVerify = async () => {
            const btn = document.querySelector('button');
            const scoreBar = document.getElementById('scoreBar');
            const scoreLabel = document.getElementById('scoreLabel');
            const scoreValue = document.getElementById('scoreValue');
            const resultDiv = document.getElementById('result');
            const auditLog = document.getElementById('auditLog');

            btn.disabled = true;
            btn.innerText = 'PROCESING...';
            
            // Artificial delay to simulate heavy cryptographic computation
            let score = 0;
            const interval = setInterval(() => {
                score += Math.floor(Math.random() * 15) + 5;
                if (score >= 100) {
                    score = 100;
                    clearInterval(interval);
                    finalize();
                }
                scoreBar.style.width = score + '%';
                scoreValue.innerText = score + '%';
                scoreLabel.innerText = 'ANALYZING PROOF';
            }, 100);

            const finalize = () => {
                btn.disabled = false;
                btn.innerText = 'INITIALIZE VERIFICATION';
                scoreLabel.innerText = 'TRUSTED';
                scoreLabel.classList.add('text-emerald-500');
                
                resultDiv.classList.remove('hidden');
                auditLog.innerHTML = `
                    <div>> [${new Date().toISOString()}] Canonicalizing JSON-LD payload...</div>
                    <div>> [${new Date().toISOString()}] Computing SHA-512 digest...</div>
                    <div>> [${new Date().toISOString()}] Resolving DID:IECC methods...</div>
                    <div>> [${new Date().toISOString()}] Validating Ed25519 elliptic curve signature...</div>
                    <div class="font-bold text-white">> RESULT: CRYPTOGRAPHIC TRUST CONFIRMED</div>
                `;
            };
        };
    </script>
</body>
</html>
